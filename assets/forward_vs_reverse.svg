<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="fwd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker>
    <marker id="bwd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
    <marker id="gray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="760" height="420" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="759" height="419" fill="none" stroke="#e5e7eb"/>

  <text x="32" y="40" font-size="19" font-weight="600" fill="#111827">Forward and reverse: two directions of one linear map J</text>

  <!-- forward arrow (top) -->
  <text x="384" y="100" font-size="13" font-weight="600" fill="#2563eb" text-anchor="middle">forward mode: seed tangent v, carry J v  (one forward pass)</text>
  <line x1="96" y1="116" x2="664" y2="116" stroke="#2563eb" stroke-width="2" marker-end="url(#fwd)"/>

  <!-- node chain -->
  <g>
    <rect x="52" y="156" width="118" height="58" rx="11" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="111" y="182" font-size="14" font-weight="600" fill="#1f2933" text-anchor="middle">x</text>
    <text x="111" y="201" font-size="11.5" fill="#64748b" text-anchor="middle">input</text>

    <rect x="234" y="156" width="120" height="58" rx="11" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="294" y="182" font-size="14" font-weight="600" fill="#1f2933" text-anchor="middle">@ W</text>
    <text x="294" y="201" font-size="11.5" fill="#64748b" text-anchor="middle">matmul</text>

    <rect x="418" y="156" width="118" height="58" rx="11" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="477" y="182" font-size="14" font-weight="600" fill="#1f2933" text-anchor="middle">tanh</text>
    <text x="477" y="201" font-size="11.5" fill="#64748b" text-anchor="middle">elementwise</text>

    <rect x="600" y="156" width="118" height="58" rx="11" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="659" y="182" font-size="14" font-weight="600" fill="#1f2933" text-anchor="middle">y = f(x)</text>
    <text x="659" y="201" font-size="11.5" fill="#64748b" text-anchor="middle">output</text>
  </g>
  <g stroke="#94a3b8" stroke-width="1.6" marker-end="url(#gray)">
    <line x1="170" y1="185" x2="232" y2="185"/>
    <line x1="354" y1="185" x2="416" y2="185"/>
    <line x1="536" y1="185" x2="598" y2="185"/>
  </g>

  <!-- reverse arrow (bottom) -->
  <line x1="664" y1="252" x2="96" y2="252" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#bwd)"/>
  <text x="384" y="276" font-size="13" font-weight="600" fill="#dc2626" text-anchor="middle">reverse mode: seed cotangent u, carry J^T u  (one backward pass)</text>

  <!-- identity -->
  <rect x="200" y="312" width="360" height="74" rx="13" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="380" y="350" font-size="22" font-weight="600" fill="#1e293b" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace">&lt;u, J v&gt;  =  &lt;J^T u, v&gt;</text>
  <text x="380" y="372" font-size="12" fill="#4b5563" text-anchor="middle">forward and reverse are adjoints, checked to 1e-10 in test_dual.py</text>
</svg>
