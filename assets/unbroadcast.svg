<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="fwd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker>
    <marker id="bwd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
  </defs>
  <rect width="980" height="520" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="979" height="519" fill="none" stroke="#e5e7eb"/>

  <text x="32" y="40" font-size="19" font-weight="600" fill="#111827">Unbroadcasting: broadcast in the forward pass, sum in the backward pass</text>

  <!-- legend -->
  <line x1="740" y1="64" x2="776" y2="64" stroke="#2563eb" stroke-width="2" marker-end="url(#fwd)"/>
  <text x="782" y="68" font-size="12.5" fill="#374151">forward: values</text>
  <line x1="740" y1="84" x2="776" y2="84" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#bwd)"/>
  <text x="782" y="88" font-size="12.5" fill="#374151">backward: gradients</text>

  <!-- ============ forward pass ============ -->
  <text x="32" y="88" font-size="12.5" fill="#6b7280">forward pass</text>

  <!-- bias b, shape (3,) -->
  <text x="60" y="147" font-size="13" font-weight="600" fill="#1f2933">b   (3,)</text>
  <g fill="#eff6ff" stroke="#bfdbfe">
    <rect x="60" y="155" width="42" height="30" rx="6"/>
    <rect x="106" y="155" width="42" height="30" rx="6"/>
    <rect x="152" y="155" width="42" height="30" rx="6"/>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#2563eb" text-anchor="middle">
    <text x="81" y="174">b0</text>
    <text x="127" y="174">b1</text>
    <text x="173" y="174">b2</text>
  </g>

  <!-- broadcast arrow -->
  <line x1="206" y1="170" x2="262" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#fwd)"/>
  <text x="235" y="158" font-size="11" fill="#4b5563" text-anchor="middle">broadcast</text>
  <text x="235" y="190" font-size="10.5" fill="#6b7280" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace">(3,) -&gt; (4,3)</text>

  <!-- broadcast(b), shape (4,3): the same row copied 4 times -->
  <text x="272" y="96" font-size="13" font-weight="600" fill="#1f2933">broadcast(b)   (4,3)</text>
  <g fill="#eff6ff" stroke="#bfdbfe">
    <rect x="272" y="104" width="42" height="30" rx="6"/><rect x="318" y="104" width="42" height="30" rx="6"/><rect x="364" y="104" width="42" height="30" rx="6"/>
    <rect x="272" y="138" width="42" height="30" rx="6"/><rect x="318" y="138" width="42" height="30" rx="6"/><rect x="364" y="138" width="42" height="30" rx="6"/>
    <rect x="272" y="172" width="42" height="30" rx="6"/><rect x="318" y="172" width="42" height="30" rx="6"/><rect x="364" y="172" width="42" height="30" rx="6"/>
    <rect x="272" y="206" width="42" height="30" rx="6"/><rect x="318" y="206" width="42" height="30" rx="6"/><rect x="364" y="206" width="42" height="30" rx="6"/>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" fill="#2563eb" text-anchor="middle">
    <text x="293" y="123">b0</text><text x="339" y="123">b1</text><text x="385" y="123">b2</text>
    <text x="293" y="157">b0</text><text x="339" y="157">b1</text><text x="385" y="157">b2</text>
    <text x="293" y="191">b0</text><text x="339" y="191">b1</text><text x="385" y="191">b2</text>
    <text x="293" y="225">b0</text><text x="339" y="225">b1</text><text x="385" y="225">b2</text>
  </g>

  <text x="433" y="177" font-size="20" fill="#4b5563" text-anchor="middle">+</text>

  <!-- W, shape (4,3) -->
  <text x="460" y="96" font-size="13" font-weight="600" fill="#1f2933">W   (4,3)</text>
  <g fill="#f8fafc" stroke="#e2e8f0">
    <rect x="460" y="104" width="42" height="30" rx="6"/><rect x="506" y="104" width="42" height="30" rx="6"/><rect x="552" y="104" width="42" height="30" rx="6"/>
    <rect x="460" y="138" width="42" height="30" rx="6"/><rect x="506" y="138" width="42" height="30" rx="6"/><rect x="552" y="138" width="42" height="30" rx="6"/>
    <rect x="460" y="172" width="42" height="30" rx="6"/><rect x="506" y="172" width="42" height="30" rx="6"/><rect x="552" y="172" width="42" height="30" rx="6"/>
    <rect x="460" y="206" width="42" height="30" rx="6"/><rect x="506" y="206" width="42" height="30" rx="6"/><rect x="552" y="206" width="42" height="30" rx="6"/>
  </g>

  <text x="621" y="177" font-size="20" fill="#4b5563" text-anchor="middle">=</text>

  <!-- out = W + b, shape (4,3) -->
  <text x="648" y="96" font-size="13" font-weight="600" fill="#1f2933">out = W + b   (4,3)</text>
  <g fill="#ecfdf5" stroke="#a7f3d0">
    <rect x="648" y="104" width="42" height="30" rx="6"/><rect x="694" y="104" width="42" height="30" rx="6"/><rect x="740" y="104" width="42" height="30" rx="6"/>
    <rect x="648" y="138" width="42" height="30" rx="6"/><rect x="694" y="138" width="42" height="30" rx="6"/><rect x="740" y="138" width="42" height="30" rx="6"/>
    <rect x="648" y="172" width="42" height="30" rx="6"/><rect x="694" y="172" width="42" height="30" rx="6"/><rect x="740" y="172" width="42" height="30" rx="6"/>
    <rect x="648" y="206" width="42" height="30" rx="6"/><rect x="694" y="206" width="42" height="30" rx="6"/><rect x="740" y="206" width="42" height="30" rx="6"/>
  </g>

  <line x1="32" y1="262" x2="948" y2="262" stroke="#e5e7eb"/>

  <!-- ============ backward pass ============ -->
  <text x="32" y="290" font-size="12.5" fill="#6b7280">backward pass</text>

  <!-- grad out, shape (4,3) -->
  <text x="648" y="292" font-size="13" font-weight="600" fill="#1f2933">grad out   (4,3)</text>
  <g fill="#fef2f2" stroke="#fecaca">
    <rect x="648" y="300" width="42" height="30" rx="6"/><rect x="694" y="300" width="42" height="30" rx="6"/><rect x="740" y="300" width="42" height="30" rx="6"/>
    <rect x="648" y="334" width="42" height="30" rx="6"/><rect x="694" y="334" width="42" height="30" rx="6"/><rect x="740" y="334" width="42" height="30" rx="6"/>
    <rect x="648" y="368" width="42" height="30" rx="6"/><rect x="694" y="368" width="42" height="30" rx="6"/><rect x="740" y="368" width="42" height="30" rx="6"/>
    <rect x="648" y="402" width="42" height="30" rx="6"/><rect x="694" y="402" width="42" height="30" rx="6"/><rect x="740" y="402" width="42" height="30" rx="6"/>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" fill="#dc2626" text-anchor="middle">
    <text x="669" y="319">g00</text><text x="715" y="319">g01</text><text x="761" y="319">g02</text>
    <text x="669" y="353">g10</text><text x="715" y="353">g11</text><text x="761" y="353">g12</text>
    <text x="669" y="387">g20</text><text x="715" y="387">g21</text><text x="761" y="387">g22</text>
    <text x="669" y="421">g30</text><text x="715" y="421">g31</text><text x="761" y="421">g32</text>
  </g>

  <!-- sum arrow, right to left: the broadcast axis is summed away -->
  <line x1="636" y1="366" x2="446" y2="366" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#bwd)"/>
  <text x="541" y="352" font-size="12.5" fill="#dc2626" text-anchor="middle">sum over axis 0</text>
  <text x="541" y="390" font-size="10.5" fill="#6b7280" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace">(4,3) -&gt; (3,)</text>
  <text x="541" y="414" font-size="13" font-weight="600" fill="#dc2626" text-anchor="middle">the adjoint of broadcast is sum</text>

  <!-- grad b, shape (3,): each entry is a column sum -->
  <text x="60" y="343" font-size="13" font-weight="600" fill="#1f2933">grad b   (3,)</text>
  <g fill="#fef2f2" stroke="#fecaca">
    <rect x="60" y="351" width="118" height="30" rx="6"/>
    <rect x="184" y="351" width="118" height="30" rx="6"/>
    <rect x="308" y="351" width="118" height="30" rx="6"/>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#dc2626" text-anchor="middle">
    <text x="119" y="370">g00+g10+g20+g30</text>
    <text x="243" y="370">g01+g11+g21+g31</text>
    <text x="367" y="370">g02+g12+g22+g32</text>
  </g>

  <text x="32" y="466" font-size="12.5" fill="#4b5563">each b[j] was copied to 4 rows in the forward pass, so grad b[j] is the sum of the 4 cells of grad out in column j</text>
  <text x="32" y="494" font-size="12.5" fill="#6b7280" font-family="ui-monospace, Menlo, Consolas, monospace">grad_b = grad_out.sum(axis=0)        # unbroadcast: (4,3) -&gt; (3,)</text>
</svg>
